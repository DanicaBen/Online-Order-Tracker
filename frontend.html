<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
    <title>Shoppie 🛍️ — C++ Full Stack Tracker</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&family=Fraunces:wght@700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <style>
        /* [KEEPING YOUR ORIGINAL CSS STYLES HERE] */
        :root{ --pink:#ff6b9d; --purple:#c084fc; --mint:#34d399; --bg:#fff9fb; --text:#1e1025; --border:#f0d6e8; --radius:16px; --sans:'Nunito',sans-serif; --display:'Fraunces',serif; }
        *{box-sizing:border-box;margin:0;padding:0}
        body{font-family:var(--sans);background:var(--bg);color:var(--text);padding-bottom:50px}
        header{background:rgba(255,255,255,.8);backdrop-filter:blur(10px);border-bottom:1.5px solid var(--border);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
        .logo{font-family:var(--display);font-size:24px;color:var(--pink)}
        .container{max-width:1100px;margin:2rem auto;padding:0 1rem}
        .card{background:#fff;border:1.5px solid var(--border);border-radius:var(--radius);padding:1.5rem;margin-bottom:1.5rem;box-shadow:0 4px 20px rgba(0,0,0,0.05)}
        .frow{display:flex;gap:10px;margin-top:10px}
        input, select{padding:10px;border:1.5px solid var(--border);border-radius:10px;flex:1}
        button{padding:10px 20px;border-radius:10px;border:none;background:var(--pink);color:#fff;font-weight:700;cursor:pointer;transition:0.2s}
        button:hover{opacity:0.9;transform:translateY(-1px)}
        .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:800}
        .b-0{background:#fef3c7;color:#92400e} /* Pending */
        .b-1{background:#dcfce7;color:#166534} /* Processing */
        #leafmap{height:300px;border-radius:12px;margin-top:10px}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th{text-align:left;padding:10px;border-bottom:2px solid var(--border);font-size:12px;color:#9b7ea8}
        td{padding:12px 10px;border-bottom:1px solid var(--border);font-size:14px}
    </style>
</head>
<body>

<header>
    <div class="logo">🛍️ Shoppie <em>FullStack</em></div>
    <div id="connection-status" class="badge" style="background:#fee2e2;color:#991b1b">Backend Offline</div>
</header>

<div class="container">
    <!-- NEW ORDER -->
    <div class="card">
        <h3>✨ Create Order (C++ API)</h3>
        <div class="frow">
            <input id="new-item" placeholder="Item name..."/>
            <input id="new-price" type="number" placeholder="Price"/>
            <select id="new-city">
                <option value="Mumbai">Mumbai</option>
                <option value="Delhi">Delhi</option>
                <option value="Bangalore">Bangalore</option>
            </select>
            <button onclick="placeOrder()">Place Order</button>
        </div>
    </div>

    <!-- QUEUE ACTIONS -->
    <div class="card" style="display:flex; justify-content: space-between; align-items: center;">
        <div>
            <h3>🚦 Processing Queue</h3>
            <p style="font-size:12px; color:#9b7ea8">Handled by <code>std::queue</code> in C++</p>
        </div>
        <button style="background:var(--purple)" onclick="processNext()">Process Next Order</button>
    </div>

    <!-- TABLE -->
    <div class="card">
        <h3>📋 Live Order History</h3>
        <table>
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Item</th>
                    <th>City</th>
                    <th>Price</th>
                    <th>Status</th>
                </tr>
            </thead>
            <tbody id="order-table-body">
                <!-- Rows injected here -->
            </tbody>
        </table>
    </div>
</div>

<script>
    const API_URL = 'http://localhost:18080/api';

    // 1. Sync Data from C++ Backend
    async function refreshData() {
        try {
            const response = await fetch(`${API_URL}/data`);
            if (!response.ok) throw new Error();
            
            const data = await response.json();
            updateUI(data.orders || []);
            
            document.getElementById('connection-status').textContent = "Backend Online";
            document.getElementById('connection-status').style.background = "#dcfce7";
            document.getElementById('connection-status').style.color = "#166534";
        } catch (err) {
            console.error("C++ Server not reachable.");
        }
    }

    // 2. Add Order via C++ unordered_map & queue
    async function placeOrder() {
        const item = document.getElementById('new-item').value;
        const price = parseFloat(document.getElementById('new-price').value);
        const city = document.getElementById('new-city').value;

        if(!item || !price) return alert("Fill details!");

        const response = await fetch(`${API_URL}/order`, {
            method: 'POST',
            body: JSON.stringify({ item, price, city })
        });

        if (response.ok) {
            document.getElementById('new-item').value = "";
            document.getElementById('new-price').value = "";
            refreshData();
        }
    }

    // 3. Process via C++ std::queue::pop()
    async function processNext() {
        const response = await fetch(`${API_URL}/process`, { method: 'POST' });
        if (response.ok) {
            refreshData();
        } else {
            alert("Queue is empty!");
        }
    }

    // 4. Render Table
    function updateUI(orders) {
        const tbody = document.getElementById('order-table-body');
        tbody.innerHTML = orders.map(o => `
            <tr>
                <td style="font-weight:900; color:var(--purple)">${o.id}</td>
                <td>${o.item}</td>
                <td>${o.city}</td>
                <td>₹${o.price}</td>
                <td><span class="badge b-${o.status}">${o.status === 0 ? 'Pending' : 'Processed'}</span></td>
            </tr>
        `).join('');
    }

    // Auto-refresh every 3 seconds to keep UI in sync with server
    setInterval(refreshData, 3000);
    refreshData();
</script>

</body>
</html>
